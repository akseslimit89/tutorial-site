<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Venice Coin 🪙</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d0d2b;color:#fff;font-family:sans-serif;text-align:center;padding:40px 20px;min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center}
.coin{font-size:120px;margin:30px;cursor:pointer;transition:transform 0.1s}
.coin:active{transform:scale(0.85)}
.score{font-size:36px;font-weight:800;color:#ffd700;margin:10px}
.btn{padding:16px 40px;background:linear-gradient(135deg,#ffd700,#ff8c00);border:none;border-radius:14px;font-size:18px;font-weight:800;color:#0d0d2b;cursor:pointer;margin:10px}
.btn:active{transform:scale(0.95)}
</style>
</head>
<body>
  <div class="score">🪙 <span id="s">0</span></div>
  <div class="coin" id="c" onclick="tap()">🪙</div>
  <div style="color:#aaa;font-size:14px;margin:10px">Tap the coin!</div>
  <button class="btn" onclick="claim()">📤 Claim to Bot</button>

<script>
let tg = Telegram?.WebApp;
if(tg) tg.expand();

let coins = 0;

function tap() {
  coins++;
  document.getElementById('s').textContent = coins;
  if(tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
}

function claim() {
  if(coins <= 0) return;
  if(tg) {
    tg.sendData(JSON.stringify({action:'claim', coins: coins}));
    coins = 0;
    document.getElementById('s').textContent = '0';
    if(tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
  } else {
    alert('Claimed ' + coins + ' coins!');
  }
}
</script>
</body>
