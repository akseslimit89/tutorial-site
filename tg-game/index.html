<meta charset="UTF-8">

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(180deg,#0d0d2b 0%,#1a1a4e 100%);min-height:100vh;color:#fff;overflow-x:hidden}
.container{max-width:420px;margin:0 auto;padding:16px;text-align:center;min-height:100vh;display:flex;flex-direction:column}

.header{padding:10px 0;display:flex;justify-content:space-between;align-items:center}
.header .score{font-size:24px;font-weight:800;background:rgba(255,255,255,0.1);padding:8px 20px;border-radius:20px;backdrop-filter:blur(10px)}
.header .score span{color:#ffd700}
.header .level{padding:8px 16px;background:rgba(255,255,255,0.1);border-radius:20px;font-size:14px}

.energy-wrap{margin:8px 0;text-align:left}
.energy-label{display:flex;justify-content:space-between;font-size:12px;color:#aaa;margin-bottom:4px}
.energy-bar{height:6px;background:rgba(255,255,255,0.15);border-radius:3px;overflow:hidden}
.energy-fill{height:100%;background:linear-gradient(90deg,#ff6b6b,#ffd700);border-radius:3px;transition:width 0.3s;width:100%}

.coin-area{flex:1;display:flex;align-items:center;justify-content:center;position:relative}
.coin-wrap{position:relative;cursor:pointer}
.coin{width:200px;height:200px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#ffd700,#ff8c00,#b8860b);display:flex;align-items:center;justify-content:center;font-size:80px;box-shadow:0 0 80px rgba(255,215,0,0.3),inset 0 -10px 30px rgba(0,0,0,0.3);transition:transform 0.1s;border:4px solid #ffd700}
.coin:active{transform:scale(0.9)}

.fly{position:absolute;font-weight:800;font-size:24px;color:#ffd700;pointer-events:none;animation:flyUp 0.8s ease-out forwards;z-index:10}
@keyframes flyUp{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-100px) scale(1.5)}}

.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:16px 0}
.stat-card{background:rgba(255,255,255,0.08);border-radius:12px;padding:10px;backdrop-filter:blur(10px);transition:all .3s}
.stat-card .num{font-size:18px;font-weight:700;color:#ffd700}
.stat-card .label{font-size:11px;color:#aaa;margin-top:2px}
.stat-card.rush{background:rgba(255,107,107,0.25);box-shadow:0 0 20px rgba(255,107,107,0.3)}

.boosts{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.boost-btn{background:linear-gradient(135deg,#4a6cf7,#6c5ce7);border:none;color:#fff;padding:12px;border-radius:12px;font-size:13px;font-weight:600;cursor:pointer;transition:transform 0.2s}
.boost-btn:active{transform:scale(0.95)}
.boost-btn:disabled{opacity:0.4}

/* NEW: MULTI AD BUTTONS */
.ad-btns{display:flex;flex-direction:column;gap:6px;margin-bottom:8px}
.ad-btn{width:100%;padding:12px 16px;border:none;border-radius:12px;font-size:13px;font-weight:700;color:#fff;cursor:pointer;transition:transform 0.2s;display:flex;align-items:center;justify-content:space-between}
.ad-btn:active{transform:scale(0.97)}
.ad-btn:disabled{opacity:0.5}
.ad-btn .left{display:flex;align-items:center;gap:8px}
.ad-btn .right{font-size:12px;opacity:.8}
.ad-btn .badge{background:rgba(255,255,255,0.25);padding:2px 8px;border-radius:10px;font-size:11px}
.ad-btn-primary{background:linear-gradient(135deg,#ff6b6b,#ff4757)}
.ad-btn-gold{background:linear-gradient(135deg,#ffd700,#ff8c00);color:#0d0d2b}
.ad-btn-purple{background:linear-gradient(135deg,#a855f7,#7c3aed)}
.ad-btn-green{background:linear-gradient(135deg,#22c55e,#16a34a)}

.claim-btn{width:100%;padding:16px;background:linear-gradient(135deg,#ffd700,#ff8c00);border:none;border-radius:14px;font-size:18px;font-weight:800;color:#0d0d2b;cursor:pointer;transition:transform 0.2s;margin-bottom:8px}
.claim-btn:active{transform:scale(0.97)}

.timer-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.85);z-index:100;justify-content:center;align-items:center;flex-direction:column}
.timer-overlay.show{display:flex}
.timer-overlay .big{font-size:72px;font-weight:800;color:#ffd700}
.timer-overlay .info{font-size:16px;color:#ccc;margin-top:12px}
.timer-overlay .bonus{font-size:14px;color:#ffd700;margin-top:6px;font-weight:600}

.ad-banner{min-height:50px;margin:8px 0;border-radius:12px;overflow:hidden;background:rgba(255,255,255,0.03);font-size:12px;color:#555;display:flex;align-items:center;justify-content:center}

.footer-links{display:flex;justify-content:center;gap:20px;padding:8px}
.footer-links a{color:#aaa;text-decoration:none;font-size:12px}
</style>

<body>
<div class="container">
  <div class="header">
    <div class="level">🪙 Lv.<span id="level">1</span></div>
    <div class="score">💰 <span id="score">0</span></div>
  </div>
  
  <div class="energy-wrap">
    <div class="energy-label">
      <span>⚡ Energy</span>
      <span id="energy-text">1000/1000</span>
    </div>
    <div class="energy-bar"><div class="energy-fill" id="energy-fill" style="width:100%"></div></div>
  </div>
  
  <div class="coin-area">
    <div class="coin-wrap" id="coin-wrap">
      <div class="coin" id="coin">🪙</div>
    </div>
  </div>
  
  <div class="stats">
    <div class="stat-card"><div class="num" id="stat-taps">0</div><div class="label">Total Taps</div></div>
    <div class="stat-card" id="stat-power-card"><div class="num" id="stat-power">1x</div><div class="label">Tap Power</div></div>
    <div class="stat-card"><div class="num" id="stat-coins">0</div><div class="label">This Session</div></div>
  </div>
  
  <div class="boosts">
    <button class="boost-btn" id="boost-power" onclick="buyBoost('power')">⚡ +1 Power<div class="cost">🪙 100</div></button>
    <button class="boost-btn" id="boost-energy" onclick="buyBoost('energy')">🔋 Full Energy<div class="cost">🪙 50</div></button>
  </div>

  <!-- 🎬 MULTI AD BUTTONS -->
  <div class="ad-btns" id="ad-btns">
    <button class="ad-btn ad-btn-primary" id="ad-boost-btn" onclick="watchAd('boost')">
      <span class="left">🎬 Watch Ad</span>
      <span class="right">+50⚡ +10🪙</span>
    </button>
    <button class="ad-btn ad-btn-gold" id="ad-daily-btn" onclick="watchAd('daily')">
      <span class="left">⭐ Daily Bonus</span>
      <span class="right" id="daily-label">2x Reward Ready!</span>
    </button>
    <button class="ad-btn ad-btn-purple" id="ad-multiply-btn" onclick="multiplyClaim()">
      <span class="left">🔁 Multiply Claim</span>
      <span class="right" id="multiply-label">2x your coins!</span>
    </button>
    <button class="ad-btn ad-btn-green" id="ad-rush-btn" onclick="watchAd('rush')">
      <span class="left">⚡ Rush Mode</span>
      <span class="right">3x Power 30s</span>
    </button>
  </div>
  
  <button class="claim-btn" onclick="claimCoins()">📤 Claim to Bot</button>

  <div class="ad-banner" id="ad-container"><small style="color:#555">— Ad Space —</small></div>
  
  <div class="footer-links">
    <a href="https://venicelab.web.id">About</a>
    <a href="#" onclick="showLeaderboard()">🏆 Top</a>
  </div>
</div>

<div class="timer-overlay" id="timer">
  <div class="big" id="timer-num">10</div>
  <div class="info" id="timer-info">📢 Loading ad... Reward incoming!</div>
  <div class="bonus" id="timer-bonus"></div>
</div>

<script>
let tg = window.Telegram?.WebApp;
if(tg) { tg.expand(); tg.enableClosingConfirmation(); }

let state = {
  coins:0, energy:1000, maxEnergy:1000, tapPower:1,
  totalTaps:0, sessionCoins:0, level:1, adWatchCount:0,
  rushMode:false, rushEnd:0,
  dailyBonus:true,
  multiplyReady:false,
};

try {
  let s = JSON.parse(localStorage.getItem('venice_state'));
  if(s) Object.assign(state, s);
} catch(e) {}


// ⚡ RUSH MODE TIMER
setInterval(() => {
  if(state.rushMode && Date.now() > state.rushEnd) {
    state.rushMode = false;
    state.tapPower = Math.max(1, state.tapPower - 2);
    document.getElementById('stat-power-card').classList.remove('rush');
    updateUI(); saveState();
  }
}, 1000);

// ⚡ ENERGY REFILL
setInterval(() => {
  if(state.energy < state.maxEnergy) {
    state.energy = Math.min(state.energy + 3, state.maxEnergy);
    updateUI(); saveState();
  }
}, 1000);

// 👆 TAP
document.getElementById('coin').addEventListener('click', (e) => {
  if(state.energy < state.tapPower) return;
  state.energy = Math.max(0, state.energy - state.tapPower);
  state.coins += state.tapPower;
  state.totalTaps += 1;
  state.sessionCoins += state.tapPower;
  
  let fly = document.createElement('div');
  fly.className = 'fly';
  fly.textContent = `+${state.tapPower}`;
  fly.style.left = (Math.random()*60+20)+'%';
  fly.style.top = (Math.random()*30+10)+'%';
  document.getElementById('coin-wrap').appendChild(fly);
  setTimeout(()=>fly.remove(), 800);
  
  if(tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
  updateUI(); saveState();
  
  let nl = Math.floor(state.totalTaps/500)+1;
  if(nl > state.level) {
    state.level = nl;
    if(tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
  }
});

function updateUI() {
  document.getElementById('score').textContent = state.coins.toLocaleString();
  document.getElementById('energy-text').textContent = `${state.energy}/${state.maxEnergy}`;
  document.getElementById('energy-fill').style.width = `${(state.energy/state.maxEnergy)*100}%`;
  document.getElementById('stat-taps').textContent = state.totalTaps.toLocaleString();
  document.getElementById('stat-power').textContent = state.rushMode ? `3x ⚡` : `${state.tapPower}x`;
  document.getElementById('stat-coins').textContent = state.sessionCoins;
  document.getElementById('level').textContent = state.level;
  
  let dl = document.getElementById('daily-label');
  dl.textContent = state.dailyBonus ? '⭐ 2x Reward!' : '✅ Done today';
  document.getElementById('ad-daily-btn').disabled = !state.dailyBonus;
  
  let ml = document.getElementById('multiply-label');
  ml.textContent = state.sessionCoins > 0 ? '2x your coins!' : 'Claim first!';
  document.getElementById('ad-multiply-btn').disabled = state.sessionCoins <= 0 || !state.multiplyReady;
}

function saveState() { try { localStorage.setItem('venice_state', JSON.stringify(state)); } catch(e) {} }

function buyBoost(t) {
  if(t === 'power') {
    let c = 100 * state.tapPower;
    if(state.coins < c) return;
    state.coins -= c; state.tapPower += 1;
    if(tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
  } else if(t === 'energy') {
    if(state.coins < 50) return;
    state.coins -= 50; state.energy = state.maxEnergy;
    if(tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('heavy');
  }
  updateUI(); saveState();
}

// 🎬 OPEN AD LINK (fallback — kalo VaniceLab gagal)
function openAdLink() {
  let ads = [
    'https://6opo.com/wrr?z=11298121&p_rid=37314776-dc73-453f-9024-07d4f44dc157&rb=r5L-31vDSjUVWY-RQ41amCGRqOKu3nRa1nOWWZA_GZREap6a97W9kv6pMjqjYxN3mOjqMqxN-jbDcpY-ltNdeaDTvbCgJ0nJ1gQcVSh3zG2aa8wsWviwD8Z_1CoxCRmcDe7OcoYjUZUAYTg8aLIUq9odhrL6cC5agoTF8jjP0oPBnhiQwqCpDxbcinfsjGw92MONLGw4N0fvWn4Jvk4AYtlyqo6sbATqMM6DpdEKaicTZovud5igJ7X-W-3QA7wVBXO6Tqw_KzJ1gyi4_6D9ufqW6vpajLCZJutXpQUlh4ZEcxMa0Zr3TuMTJ2fMToF7hJuMVC3VK8kOXByTY0OlmOqkYCOqgjDK',
    'https://www.effectivecpmnetwork.com/xhgf1sj3b?key=6048daa838a4bd6f87c6330df02084fb',
  ];
  let url = ads[Math.floor(Math.random() * ads.length)];
  setTimeout(() => {
    try {
      if(tg && tg.openLink) tg.openLink(url, {try_instant_view: false});
      else if(tg && tg.openExternalLink) tg.openExternalLink(url);
      else window.open(url, '_blank');
    } catch(e) {}
  }, 200);
}

// 🎬 SHOW VANICELAB REWARDED AD
function showVaniceAd(rewardCallback) {
  if(typeof show_11323629 === 'function') {
    show_11323629()
      .then(() => { rewardCallback(); })
      .catch(e => {
        // VaniceLab gagal — fallback ke openAdLink
        openAdLink();
        setTimeout(() => { rewardCallback(); }, 12000);
      });
  } else {
    // SDK belum load — fallback
    openAdLink();
    setTimeout(() => { rewardCallback(); }, 12000);
  }
}

// 🎬 SHOW VANICELAB REWARDED POPUP
function showVanicePop(rewardCallback) {
  if(typeof show_11323629 === 'function') {
    show_11323629('pop')
      .then(() => { rewardCallback(); })
      .catch(e => {
        openAdLink();
        setTimeout(() => { rewardCallback(); }, 15000);
      });
  } else {
    openAdLink();
    setTimeout(() => { rewardCallback(); }, 15000);
  }
}

// 🎬 WATCH AD (3 TYPES)
function watchAd(type) {
  if(type === 'boost') {
    let btn = document.getElementById('ad-boost-btn');
    if(btn.disabled) return;
    btn.disabled = true;
    
    showTimer(12, '📢 Loading ad...', '', () => {
      showVaniceAd(() => {
        state.energy = Math.min(state.energy + 50, state.maxEnergy);
        state.coins += 10;
        state.sessionCoins += 10;
        state.adWatchCount += 1;
        flyReward('🎬 +50⚡ +10🪙');
        setTimeout(() => { btn.disabled = false; }, 25000);
      });
    });
    
  } else if(type === 'daily') {
    let btn = document.getElementById('ad-daily-btn');
    if(!state.dailyBonus || btn.disabled) return;
    btn.disabled = true;
    
    showTimer(15, '⭐ Daily Bonus!', 'Watch ad for DOUBLE reward!', () => {
      showVanicePop(() => {
        let bonus = 100;
        state.coins += bonus;
        state.sessionCoins += bonus;
        state.energy = state.maxEnergy;
        state.dailyBonus = false;
        state.adWatchCount += 1;
        flyReward('⭐ +100🪙 +Full Energy');
        if(tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
      });
    });
    
  } else if(type === 'rush') {
    let btn = document.getElementById('ad-rush-btn');
    if(state.rushMode || btn.disabled) return;
    btn.disabled = true;
    
    showTimer(10, '⚡ Rush Mode!', '3x tap power for 30 seconds!', () => {
      showVaniceAd(() => {
        state.rushMode = true;
        state.rushEnd = Date.now() + 30000;
        state.tapPower = Math.max(state.tapPower, 1) + 2;
        state.adWatchCount += 1;
        document.getElementById('stat-power-card').classList.add('rush');
        flyReward('⚡ 3x POWER 30s!');
        if(tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('heavy');
        setTimeout(() => { btn.disabled = false; }, 45000);
      });
    });
  }
  
  updateUI(); saveState();
}

// 🔁 MULTIPLY CLAIM
function multiplyClaim() {
  let btn = document.getElementById('ad-multiply-btn');
  if(state.sessionCoins <= 0 || !state.multiplyReady || btn.disabled) return;
  btn.disabled = true;
  
  showTimer(12, '🔁 Multiply Claim!', `2x your ${state.sessionCoins} coins!`, () => {
    showVanicePop(() => {
      state.coins += state.sessionCoins;
      state.sessionCoins *= 2;
      state.adWatchCount += 1;
      state.multiplyReady = false;
      flyReward('🔁 2x MULTIPLIED!');
      if(tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
      setTimeout(() => { btn.disabled = false; }, 60000);
    });
  });
  updateUI(); saveState();
}

// ⏱ TIMER HELPER
function showTimer(seconds, info, bonus, callback) {
  let overlay = document.getElementById('timer');
  let numEl = document.getElementById('timer-num');
  let infoEl = document.getElementById('timer-info');
  let bonusEl = document.getElementById('timer-bonus');
  
  infoEl.textContent = info;
  bonusEl.textContent = bonus || '';
  overlay.classList.add('show');
  
  let count = seconds;
  numEl.textContent = count;
  
  let timer = setInterval(() => {
    count--;
    numEl.textContent = count;
    if(count <= 0) {
      clearInterval(timer);
      overlay.classList.remove('show');
      if(callback) callback();
      updateUI(); saveState();
    }
  }, 1000);
}

// 🎉 FLY REWARD
function flyReward(text) {
  let f = document.createElement('div');
  f.className = 'fly';
  f.textContent = text;
  f.style.left = '25%';
  f.style.top = '35%';
  f.style.fontSize = '18px';
  document.querySelector('.container').appendChild(f);
  setTimeout(()=>f.remove(), 1200);
}

// 📤 CLAIM → RESET MULTIPLY
function claimCoins() {
  if(state.sessionCoins <= 0) return;
  if(tg) {
    tg.sendData(JSON.stringify({action:'claim', coins: state.sessionCoins}));
    state.multiplyReady = true;
    state.sessionCoins = 0;
    updateUI(); saveState();
    if(tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
  }
}

function showLeaderboard() {
  if(tg) tg.sendData(JSON.stringify({action:'get_leaderboard'}));
}

// ⏰ RESET DAILY BONUS (checks every minute)
setInterval(() => {
  let today = new Date().toDateString();
  let saved = localStorage.getItem('venice_daily');
  if(saved !== today) {
    state.dailyBonus = true;
    localStorage.setItem('venice_daily', today);
    saveState(); updateUI();
  }
}, 60000);

// CHECK BOOST DISABLE
setInterval(() => {
  let pc = 100 * state.tapPower;
  document.querySelector('#boost-power .cost').textContent = `🪙 ${pc}`;
  document.getElementById('boost-power').disabled = state.coins < pc;
  document.getElementById('boost-energy').disabled = state.coins < 50 || state.energy >= state.maxEnergy;
}, 500);

// SET DAILY ON LOAD
if(!localStorage.getItem('venice_daily')) {
  localStorage.setItem('venice_daily', new Date().toDateString());
}

// 🎬 VANICELAB IN-APP INTERSTITIAL (auto ads)
setTimeout(() => {
  if(typeof show_11323629 === 'function') {
    show_11323629({
      type: 'inApp',
      inAppSettings: {
        frequency: 2,
        capping: 0.1,
        interval: 30,
        timeout: 5,
        everyPage: false
      }
    });
  }
}, 3000);

updateUI();
</script>
